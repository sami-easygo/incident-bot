name = "kick-incident-agent"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[rules]]
type = "Text"
globs = ["**/*.md"]

[vars]
CLOUDFLARE_ZONE_ID = ""  # your Kick zone ID

# Set these via: wrangler secret put <NAME>
# SLACK_BOT_TOKEN
# SLACK_SIGNING_SECRET
# ANTHROPIC_API_KEY
# CLOUDFLARE_API_TOKEN
# DATADOG_API_KEY
# DATADOG_APP_KEY
